<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>URL Checker</title>
  </head>
  <body>
    <main>
      <h1>URL Checker</h1>

      <label for="url-input">Enter a URL</label>
      <input
        id="url-input"
        type="text"
        placeholder="google.com"
        autocomplete="off"
        spellcheck="false"
      />

      <!-- show format/existence results here -->
      <div id="status">Enter a URL to start...</div>
    </main>

    <!-- load compiled TS here -->
    <script type="module" src="./dist/main.js"></script>
  </body>
</html>
